name: YYC³ Enhanced CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      run_e2e:
        description: 'Run E2E tests'
        required: false
        default: 'false'
        type: boolean
      run_performance:
        description: 'Run performance benchmarks'
        required: false
        default: 'false'
        type: boolean

env:
  NODE_VERSION: '20.x'
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  COVERAGE_THRESHOLD: 80
  TEST_TIMEOUT_MS: 30000

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-quality:
    name: 🔍 Code Quality & Linting
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🔎 Run ESLint
        id: eslint
        run: |
          echo "Running ESLint..."
          npm run lint -- --format json > eslint-report.json || true
          npm run lint -- --format stylish 2>&1 | tee eslint-output.txt
          if [ -s eslint-output.txt ]; then
            echo "has_issues=true" >> $GITHUB_OUTPUT
          else
            echo "has_issues=false" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: 🏷️ Run TypeScript Type Check
        id: typecheck
        run: |
          echo "Running TypeScript compiler..."
          npx tsc --noEmit 2>&1 | tee tsc-output.txt || true
          if grep -q "error TS" tsc-output.txt; then
            echo "has_errors=true" >> $GITHUB_OUTPUT
            echo "::warning::TypeScript errors found"
          else
            echo "has_errors=false" >> $GITHUB_OUTPUT
          fi

      - name: 📊 Upload ESLint report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eslint-report
          path: |
            eslint-report.json
            eslint-output.txt
          retention-days: 7

  unit-tests:
    name: 🧪 Unit Tests (SQLite Mock)
    runs-on: ubuntu-latest
    needs: code-quality
    
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🧪 Run unit tests with coverage
        id: test
        run: |
          echo "Running unit tests..."
          npx jest \
            --testPathPattern='__tests__/(utils|services|components)' \
            --coverage \
            --coverageReporters=text-summary \
            --coverageReporters=lcov \
            --coverageDirectory=coverage/unit \
            --ci \
            --reporters=default \
            --reporters=jest-junit \
            --testTimeout=${{ env.TEST_TIMEOUT_MS }} \
            --verbose 2>&1 | tee test-results.txt
          
          # Extract coverage percentage
          COVERAGE=$(grep "All files" coverage/unit/text-summary.txt | awk '{print $NF}' | tr -d '%')
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
          echo "## Unit Test Coverage: ${COVERAGE}%" >> $GITHUB_STEP_SUMMARY
          
          if (( $(echo "$COVERAGE < $COVERAGE_THRESHOLD" | bc -l) )); then
            echo "::warning::Coverage ${COVERAGE}% is below threshold ${COVERAGE_THRESHOLD}%"
          fi

      - name: ✅ Check test results
        if: steps.test.outcome == 'failure'
        run: exit 1

      - name: 📈 Upload unit test coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-coverage-${{ matrix.node-version }}
          path: |
            coverage/unit/
            junit.xml
            test-results.txt
          retention-days: 14

  integration-tests:
    name: 🔗 Integration Tests (Database)
    runs-on: ubuntu-latest
    needs: unit-tests
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: yyc3_test
          POSTGRES_PASSWORD: yyc3_test_2024
          POSTGRES_DB: yyc3_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🗄️ Wait for PostgreSQL to be ready
        run: |
          until pg_isready -h localhost -p 5432 -U yyc3_test; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
          echo "PostgreSQL is ready!"

      - name: 🔗 Run integration tests (SQLite in-memory)
        id: integration-test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: yyc3_test
          DB_PASSWORD: yyc3_test_2024
          DB_NAME: yyc3_test_db
          NODE_ENV: test
        run: |
          echo "Running integration tests with SQLite mock..."
          npx jest \
            --testPathPattern='__tests__/integration' \
            --coverage \
            --coverageReporters=text-summary \
            --coverageReporters=lcov \
            --coverageDirectory=coverage/integration \
            --ci \
            --verbose \
            --forceExit 2>&1 | tee integration-results.txt
          
          echo "✅ Integration tests completed"

      - name: 📊 Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-coverage
          path: |
            coverage/integration/
            integration-results.txt
          retention-days: 14

  e2e-tests:
    name: 🌐 E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.event.inputs.run_e2e == 'true' || github.event_name == 'push'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🌐 Install Playwright browsers
        run: npx playwright install --with-deps

      - name: 🚀 Build application for E2E testing
        run: npm run build

      - name: 🌐 Run Playwright E2E tests
        run: npx playwright test || true

      - name: 📸 Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: 📊 Upload test traces
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

  performance-benchmarks:
    name: ⚡ Performance Benchmarks
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.event.inputs.run_performance == 'true' || github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: ⚡ Run performance benchmarks
        run: |
          echo "Running performance benchmarks..."
          npm test -- __tests__/services/performance.test.ts --verbose 2>&1 | tee perf-results.txt
          
          # Extract key metrics
          if grep -q "Performance threshold exceeded" perf-results.txt; then
            echo "::warning::Performance regression detected!"
            exit 1
          fi
          
          echo "✅ Performance benchmarks passed"

      - name: 📊 Upload performance results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-benchmarks
          path: perf-results.txt
          retention-days: 90

  build-and-package:
    name: 📦 Build & Package
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: github.event_name == 'push'

    strategy:
      matrix:
        include:
          - platform: linux/amd64
            suffix: linux-amd64
          - platform: linux/arm64
            suffix: linux-arm64

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: ⚙️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🏗️ Build Next.js application
        run: npm run build

      - name: 🐳 Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch,suffix=-${{ matrix.suffix }}
            type=sha,prefix=,suffix=-${{ matrix.suffix }}
            type=raw,value=latest,enable={{is_default_branch}},suffix=-${{ matrix.suffix }}

      - name: 🐳 Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
            NEXT_PUBLIC_COMMIT_SHA=${{ github.sha }}

  generate-coverage-report:
    name: 📊 Generate Coverage Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: always()

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📥 Download all coverage artifacts
        uses: actions/download-artifact@v4
        with:
          path: coverage-reports
          pattern: '*-test-*'
          merge-multiple: true

      - name: 📊 Generate HTML coverage report
        run: |
          echo "# 📊 YYC³ Test Coverage Report" > $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Check if coverage files exist
          if [ -f "coverage-reports/unit/lcov.info" ]; then
            echo "### Unit Tests" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            cat coverage-reports/unit/text-summary.txt 2>/dev/null || echo "No summary available" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f "coverage-reports/integration/lcov.info" ]; then
            echo "### Integration Tests" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            cat coverage-reports/integration/text-summary.txt 2>/dev/null || echo "No summary available" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*Generated on $(date)*" >> $GITHUB_STEP_SUMMARY

      - name: 📤 Upload combined coverage report
        uses: actions/upload-artifact@v4
        with:
          name: full-coverage-report
          path: coverage-reports/
          retention-days: 30

  notify-status:
    name: 📢 Notify Status
    runs-on: ubuntu-latest
    needs: [build-and-package, generate-coverage-report]
    if: always()
    
    steps:
      - name: 📢 Determine status
        id: status
        run: |
          if [[ "${{ needs.build-and-package.result }}" == "success" ]]; then
            echo "status=✅ Success" >> $GITHUB_OUTPUT
            echo "color=good" >> $GITHUB_OUTPUT
          else
            echo "status=❌ Failed" >> $GITHUB_OUTPUT
            echo "color=danger" >> $GITHUB_OUTPUT
          fi

      - name: 💬 Send notification (Slack/Webhook)
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{
              \"text\": \"YYC³ CI/CD Pipeline ${{ steps.status.status }}\",
              \"attachments\": [{
                \"color\": \"${{ steps.status.color }}\",
                \"fields\": [
                  {\"title\": \"Repository\", \"value\": \"${{ github.repository }}\", \"short\": true},
                  {\"title\": \"Branch\", \"value\": \"${{ github.ref_name }}\", \"short\": true},
                  {\"title\": \"Commit\", \"value\": \"${{ github.sha }}\", \"short\": true},
                  {\"title\": \"Actor\", \"value\": \"${{ github.actor }}\", \"short\": true}
                ]
              }]
            }" \
            $SLACK_WEBHOOK_URL || true
