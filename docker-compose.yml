version: '3.8'

services:
  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3737:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_HOST=db
      - DATABASE_PORT=3306
      - DATABASE_USER=${DB_USER:-yyc3_web}
      - DATABASE_PASSWORD=${DB_PASSWORD:-yyc3_web_2026}
      - DATABASE_NAME=${DB_NAME:-yyc3_web}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-yyc3_jwt_secret_prod}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-yyc3_nextauth_secret_prod}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3737}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - nextjs_data:/app/.next
      - avatars_data:/app/public/avatars

  # MariaDB Database
  db:
    image: mariadb:10.11
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-root_password_2026}
      - MYSQL_DATABASE=${DB_NAME:-yyc3_web}
      - MYSQL_USER=${DB_USER:-yyc3_web}
      - MYSQL_PASSWORD=${DB_PASSWORD:-yyc3_web_2026}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max-connections=200
      - --innodb-buffer-pool-size=256M

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  # Conversion Engine Service (Optional - for heavy processing)
  conversion-engine:
    build:
      context: ./services/conversion-engine
      dockerfile: Dockerfile
    ports:
      - "3738:3738"
    environment:
      - NODE_ENV=production
      - PORT=3738
      - MONGODB_URI=mongodb://mongo:27017/conversion_engine
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_started
      mongo:
        condition: service_healthy
    restart: unless-stopped

  # MongoDB (for conversion task storage)
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  mariadb_data:
  redis_data:
  mongo_data:
  nextjs_data:
  avatars_data:

networks:
  default:
    name: yyc3_network
